<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Inventura Dobytka 2025</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f4f0; color: #1a1a1a; font-size: 15px; }
.header { background: #2d6a2d; color: white; padding: 12px 16px 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.header h1 { font-size: 17px; font-weight: 700; }
.header-sub { font-size: 11px; opacity: 0.8; margin-top: 1px; }
.stats-bar { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.stat { background: rgba(255,255,255,0.18); border-radius: 10px; padding: 3px 9px; font-size: 12px; font-weight: 600; }
.stat.ok { background: rgba(100,220,100,0.3); }
.stat.warn { background: rgba(255,180,50,0.3); }
.stat.bad { background: rgba(255,100,100,0.3); }
.filter-bar { background: white; border-bottom: 1px solid #e0e0e0; padding: 8px 12px; position: sticky; top: 76px; z-index: 99; }
.filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
.filter-row + .filter-row { margin-top: 6px; }
.fb { padding: 5px 11px; border-radius: 14px; border: 1.5px solid #ccc; background: white; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.fb.active { background: #2d6a2d; color: white; border-color: #2d6a2d; }
.fb.ales.active { background: #1565c0; border-color: #1565c0; }
.fb.pavel.active { background: #6a1f8a; border-color: #6a1f8a; }
.search-wrap { padding: 8px 12px 0; background: white; }
.search-input { width: 100%; padding: 8px 14px; border: 1.5px solid #ccc; border-radius: 20px; font-size: 15px; outline: none; }
.search-input:focus { border-color: #2d6a2d; }
.tabs { display: flex; background: white; border-bottom: 2px solid #e8e8e8; position: sticky; top: 156px; z-index: 98; }
.tab { flex: 1; text-align: center; padding: 9px 4px; font-size: 12px; font-weight: 700; color: #888; cursor: pointer; border-bottom: 3px solid transparent; }
.tab.active { color: #2d6a2d; border-bottom-color: #2d6a2d; }
.list { padding: 8px 10px 60px; }
.card { background: white; border-radius: 12px; margin-bottom: 7px; border: 1.5px solid #e0e0e0; overflow: hidden; }
.card-header { display: flex; align-items: center; padding: 9px 11px; cursor: pointer; gap: 8px; }
.subj-badge { font-size: 10px; font-weight: 800; border-radius: 5px; padding: 2px 6px; flex-shrink: 0; }
.subj-ales { background: #e3f0ff; color: #1565c0; }
.subj-pavel { background: #f3e5f5; color: #6a1f8a; }
.ear-tag { font-weight: 800; font-size: 13px; border-radius: 7px; padding: 5px 7px; min-width: 62px; text-align: center; flex-shrink: 0; }
.tag-f { background: #ffe0b2; color: #5d3200; }
.tag-m { background: #b3e5fc; color: #01374d; }
.animal-info { flex: 1; min-width: 0; }
.animal-name { font-size: 13px; font-weight: 600; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.animal-sub { font-size: 11px; color: #777; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badges { display: flex; gap: 3px; flex-shrink: 0; align-items: center; }
.ibadge { font-size: 13px; }
.status-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.dot-ok { background: #43a047; }
.dot-miss { background: #e53935; }
.dot-none { background: #bdbdbd; }
.chevron { color: #bbb; font-size: 17px; transition: transform 0.2s; }
.card.open .chevron { transform: rotate(90deg); }
.card-body { display: none; border-top: 1px solid #f0f0f0; padding: 12px; }
.card.open .card-body { display: block; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 12px; }
.info-item label { font-size: 10px; color: #999; font-weight: 700; text-transform: uppercase; display: block; }
.info-item span { font-size: 13px; color: #222; font-weight: 500; }
.info-item.full { grid-column: span 2; }
.bohus-banner { background: #e3f0ff; border-radius: 8px; padding: 7px 10px; font-size: 12px; font-weight: 700; color: #1565c0; margin-bottom: 10px; }
.check-section { background: #f9fbe7; border-radius: 10px; padding: 11px; }
.check-section h3 { font-size: 11px; font-weight: 800; color: #558b2f; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.check-label { font-size: 13px; flex: 1; }
.ctg { display: flex; gap: 4px; }
.cb { padding: 6px 10px; border-radius: 7px; border: 1.5px solid #ccc; background: white; font-size: 12px; font-weight: 700; cursor: pointer; }
.cb.ok { background: #43a047; color: white; border-color: #43a047; }
.cb.nok { background: #e53935; color: white; border-color: #e53935; }
.cb.miss { background: #fb8c00; color: white; border-color: #fb8c00; }
.vzorku-input { width: 70px; padding: 6px 8px; border: 1.5px solid #ccc; border-radius: 7px; font-size: 14px; font-weight: 700; text-align: center; }
.notes-input { width: 100%; margin-top: 8px; padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 13px; resize: none; height: 52px; font-family: inherit; }
.save-btn { width: 100%; margin-top: 6px; background: #2d6a2d; color: white; border: none; border-radius: 9px; padding: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
.saved-ok { text-align: center; color: #43a047; font-weight: 700; font-size: 12px; margin-top: 5px; display: none; }
.exp-panel { padding: 12px; }
.exp-card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1.5px solid #e0e0e0; }
.exp-card h3 { font-weight: 700; color: #2d6a2d; margin-bottom: 8px; font-size: 14px; }
.sum-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.sum-table th { background: #e8f5e9; text-align: left; padding: 5px 7px; }
.sum-table td { padding: 5px 7px; border-bottom: 1px solid #f5f5f5; }
.prog-bar { background: #e0e0e0; border-radius: 6px; height: 7px; margin-top: 8px; }
.prog-fill { background: #43a047; border-radius: 6px; height: 7px; }
.prog-label { font-size: 11px; color: #888; text-align: right; margin-top: 3px; }
.exp-btn { background: #2d6a2d; color: white; border: none; border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 4px; }
.krev-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.krev-table th { background: #fce4ec; padding: 5px 7px; text-align: left; }
.krev-table td { padding: 5px 7px; border-bottom: 1px solid #f9f9f9; }
.krev-table tr.done td { color: #43a047; }
.prob-row { font-size: 12px; padding: 4px 0; border-bottom: 1px solid #f5f5f5; }
.empty { text-align: center; padding: 36px 20px; color: #bbb; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>🐄 Inventura Dobytka 2025</h1>
  <div class="header-sub" id="date-disp"></div>
  <div class="stats-bar" id="stats-bar"></div>
</div>

<div class="filter-bar">
  <div class="filter-row">
    <button class="fb active" id="fs-vse"   onclick="setSubj('vse')">Vše</button>
    <button class="fb ales"   id="fs-ales"  onclick="setSubj('ales')">🔵 Aleš</button>
    <button class="fb pavel"  id="fs-pavel" onclick="setSubj('pavel')">🟣 Pavel</button>
  </div>
  <div class="filter-row">
    <button class="fb active" id="ft-vse"  onclick="setTyp('vse')">Vše</button>
    <button class="fb"        id="ft-nezk" onclick="setTyp('nezk')">❌ Nezkontr.</button>
    <button class="fb"        id="ft-krev" onclick="setTyp('krev')">🩸 Odběr krve</button>
    <button class="fb"        id="ft-brez" onclick="setTyp('brez')">🐄 Vhodné k telení</button>
    <button class="fb"        id="ft-znam" onclick="setTyp('znam')">🏷️ Probl. známky</button>
  </div>
</div>
<div class="search-wrap">
  <input class="search-input" type="search" id="search" placeholder="🔍  Hledat číslo, ušní číslo, plemeno..." oninput="renderList()">
</div>
<div class="tabs">
  <div class="tab active" id="tab-list"   onclick="setTab('list')">📋 Seznam</div>
  <div class="tab"        id="tab-krev"   onclick="setTab('krev')">🩸 Seznam krví</div>
  <div class="tab"        id="tab-export" onclick="setTab('export')">📊 Přehled</div>
</div>

<div id="view-list"><div class="list" id="animal-list"></div></div>
<div id="view-krev"   style="display:none"><div class="exp-panel" id="krev-panel"></div></div>
<div id="view-export" style="display:none"><div class="exp-panel" id="exp-panel"></div></div>

function save() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => localStorage.setItem('inventura_checks', JSON.stringify(checks)), 800);
}

function loadLocal() {
  const saved = localStorage.getItem('inventura_checks');
  if (saved) { try { checks = JSON.parse(saved); } catch(e) {} }
  ANIMALS.forEach(a => {
    if (a.cisloVzorku != null) {
      if (!checks[a.cislo]) checks[a.cislo] = {videno:null,znamky:null,krev:null,brezost:null,cisloVzorku:null,poznamka:''};
      if (!checks[a.cislo].cisloVzorku) checks[a.cislo].cisloVzorku = String(a.cisloVzorku);
    }
  });
}

function getFiltered() {
  let list = [...ANIMALS];
  if (fSubj === 'ales')  list = list.filter(a => a.subjekt === 'Ales');
  if (fSubj === 'pavel') list = list.filter(a => a.subjekt === 'Pavel');
  if (fTyp === 'nezk') list = list.filter(a => !getC(a.cislo).videno);
  if (fTyp === 'krev') list = list.filter(a => a.potrebujeKrev);
  if (fTyp === 'brez') list = list.filter(a => a.vhodnaTeleni);
  if (fTyp === 'znam') list = list.filter(a => getC(a.cislo).znamky && getC(a.cislo).znamky !== 'ok');
  const q = (document.getElementById('search').value || '').toLowerCase();
  if (q) list = list.filter(a =>
    a.cislo.toLowerCase().includes(q) ||
    a.usniciCislo.toLowerCase().includes(q) ||
    (a.plemeno || '').toLowerCase().includes(q)
  );
  return list;
}

function setSubj(v) {
  fSubj = v;
  ['vse','ales','pavel'].forEach(x => document.getElementById('fs-'+x).classList.toggle('active', x===v));
  renderList(); updateStats();
}

function setTyp(v) {
  fTyp = v;
  ['vse','nezk','krev','brez','znam'].forEach(x => document.getElementById('ft-'+x).classList.toggle('active', x===v));
  renderList();
}

function setTab(v) {
  activeTab = v;
  ['list','krev','export'].forEach(x => {
    document.getElementById('tab-'+x).classList.toggle('active', x===v);
    document.getElementById('view-'+x).style.display = x===v ? 'block' : 'none';
  });
  if (v === 'krev') renderKrev();
  if (v === 'export') renderExport();
}

function updateStats() {
  const base = ANIMALS;
  const videno = base.filter(a => getC(a.cislo).videno === 'ok').length;
  const kTot = base.filter(a => a.potrebujeKrev).length;
  const kOk  = base.filter(a => a.potrebujeKrev && getC(a.cislo).krev === 'ok').length;
  const miss = base.filter(a => getC(a.cislo).videno === 'nenalezeno').length;
  document.getElementById('stats-bar').innerHTML =
    '<span class="stat ok">✅ ' + videno + '/' + base.length + '</span>' +
    '<span class="stat warn">🩸 ' + kOk + '/' + kTot + '</span>' +
    (miss ? '<span class="stat bad">❌ ' + miss + ' chybí</span>' : '');
}

function toggleCard(c) { document.getElementById('card-'+c).classList.toggle('open'); }

function setBtn(c, field, val, el) {
  const prev = getC(c)[field];
  const nv = prev === val ? null : val;
  setC(c, field, nv);
  el.closest('.ctg').querySelectorAll('.cb').forEach(b => {
    b.className = 'cb';
    if (b.getAttribute('data-v') === nv) b.classList.add(nv === 'ok' ? 'ok' : nv === 'nok' ? 'nok' : 'miss');
  });
  const dot = document.getElementById('dot-'+c);
  if (dot) {
    const ch = getC(c);
    dot.className = 'status-dot ' + (ch.videno === 'ok' ? 'dot-ok' : ch.videno === 'nenalezeno' ? 'dot-miss' : 'dot-none');
  }
  updateStats(); save();
}

function saveCard(c) {
  const vz = document.getElementById('vz-'+c);
  if (vz) setC(c, 'cisloVzorku', vz.value.trim() || null);
  const nt = document.getElementById('note-'+c);
  if (nt) setC(c, 'poznamka', nt.value);
  save();
  const b = document.getElementById('saved-'+c);
  if (b) { b.style.display='block'; setTimeout(()=>b.style.display='none', 2000); }
}

function renderList() {
  const list = getFiltered();
  const el = document.getElementById('animal-list');
  if (!list.length) { el.innerHTML = '<div class="empty">Žádná zvířata</div>'; return; }

  el.innerHTML = list.map(a => {
    const c = getC(a.cislo);
    const sf = isSamice(a);
    const tagCls = sf ? 'tag-f' : 'tag-m';
    const dotCls = c.videno==='ok' ? 'dot-ok' : c.videno==='nenalezeno' ? 'dot-miss' : 'dot-none';
    const subjCls = a.subjekt==='Ales' ? 'subj-ales' : 'subj-pavel';
    const subjLbl = a.subjekt==='Ales' ? 'ALEŠ' : 'PAVEL';
    const plShort = (a.plemeno||'').split(' - ')[0] || '–';
    const vzorku = c.cisloVzorku || (a.cisloVzorku ? String(a.cisloVzorku) : null);
    const shortCislo = a.cislo.slice(-9, -3);

    let bodyHtml = '';
    if (a.jeBohus) bodyHtml += '<div class="bohus-banner">🐂 Plemenný býk Béďa — odběr krve</div>';
    bodyHtml += '<div class="info-grid">' +
      '<div class="info-item"><label>Ušní číslo</label><span>' + a.usniciCislo + '</span></div>' +
      '<div class="info-item"><label>Pohlaví / Kat.</label><span>' + a.pohlavi + ' · ' + a.kategorie + '</span></div>' +
      '<div class="info-item"><label>Datum nar.</label><span>' + a.datNar + '</span></div>' +
      '<div class="info-item"><label>Stáří</label><span>' + a.stari + '</span></div>' +
      '<div class="info-item"><label>Plemeno</label><span>' + (a.plemeno||'–') + '</span></div>' +
      '<div class="info-item"><label>Provozovna</label><span>' + a.provozovna + '</span></div>' +
      '<div class="info-item full"><label>Matka</label><span>' + (a.matka||'–') + '</span></div>' +
      '</div>';

    bodyHtml += '<div class="check-section"><h3>📋 Kontrola ' + new Date().toLocaleDateString('cs-CZ') + '</h3>';

    bodyHtml += '<div class="check-row"><span class="check-label">👁️ Viděno</span><div class="ctg">' +
      '<button class="cb ' + (c.videno==='ok'?'ok':'') + '" data-v="ok" onclick="setBtn('' + a.cislo + '','videno','ok',this)">OK</button>' +
      '<button class="cb ' + (c.videno==='nenalezeno'?'nok':'') + '" data-v="nenalezeno" onclick="setBtn('' + a.cislo + '','videno','nenalezeno',this)">Chybí</button>' +
      '</div></div>';

    bodyHtml += '<div class="check-row"><span class="check-label">🏷️ Ušní známky</span><div class="ctg">' +
      '<button class="cb ' + (c.znamky==='ok'?'ok':'') + '" data-v="ok" onclick="setBtn('' + a.cislo + '','znamky','ok',this)">OK</button>' +
      '<button class="cb ' + (c.znamky==='chybi'?'miss':'') + '" data-v="chybi" onclick="setBtn('' + a.cislo + '','znamky','chybi',this)">Chybí</button>' +
      '<button class="cb ' + (c.znamky==='jedna'?'miss':'') + '" data-v="jedna" onclick="setBtn('' + a.cislo + '','znamky','jedna',this)">1 ks</button>' +
      '</div></div>';

    if (a.potrebujeKrev) {
      bodyHtml += '<div class="check-row"><span class="check-label">🩸 Odběr krve</span><div class="ctg">' +
        '<button class="cb ' + (c.krev==='ok'?'ok':'') + '" data-v="ok" onclick="setBtn('' + a.cislo + '','krev','ok',this)">Odebráno</button>' +
        '<button class="cb ' + (c.krev==='nok'?'nok':'') + '" data-v="nok" onclick="setBtn('' + a.cislo + '','krev','nok',this)">Neodebráno</button>' +
        '</div></div>';
      bodyHtml += '<div class="check-row"><span class="check-label">🔢 Číslo vzorku</span>' +
        '<input class="vzorku-input" id="vz-' + a.cislo + '" type="number" min="1" value="' + (vzorku||'') + '" placeholder="č."></div>';
    }

    if (sf && a.vhodnaTeleni) {
      bodyHtml += '<div class="check-row"><span class="check-label">🐄 Březost / Telení</span><div class="ctg">' +
        '<button class="cb ' + (c.brezost==='brezna'?'ok':'') + '" data-v="brezna" onclick="setBtn('' + a.cislo + '','brezost','brezna',this)">Březí</button>' +
        '<button class="cb ' + (c.brezost==='ma_tele'?'ok':'') + '" data-v="ma_tele" onclick="setBtn('' + a.cislo + '','brezost','ma_tele',this)">Má tele</button>' +
        '<button class="cb ' + (c.brezost==='prazdna'?'nok':'') + '" data-v="prazdna" onclick="setBtn('' + a.cislo + '','brezost','prazdna',this)">Prázdná</button>' +
        '<button class="cb ' + (c.brezost==='?'?'miss':'') + '" data-v="?" onclick="setBtn('' + a.cislo + '','brezost','?',this)">?</button>' +
        '</div></div>';
    }

    bodyHtml += '<textarea class="notes-input" id="note-' + a.cislo + '" placeholder="Poznámka...">' + (c.poznamka||'') + '</textarea>';
    bodyHtml += '<button class="save-btn" onclick="saveCard('' + a.cislo + '')">💾 Uložit</button>';
    bodyHtml += '<div class="saved-ok" id="saved-' + a.cislo + '">✅ Uloženo</div>';
    bodyHtml += '</div>';

    return '<div class="card" id="card-' + a.cislo + '">' +
      '<div class="card-header" onclick="toggleCard('' + a.cislo + '')">' +
      '<span class="subj-badge ' + subjCls + '">' + subjLbl + '</span>' +
      '<div class="ear-tag ' + tagCls + '">' + shortCislo + '</div>' +
      '<div class="animal-info">' +
      '<div class="animal-name">' + a.usniciCislo + '</div>' +
      '<div class="animal-sub">' + a.pohlavi + ' · ' + plShort + ' · ' + a.stari + (vzorku ? ' · 🩸' + vzorku : '') + (a.jeBohus ? ' · 🐂' : '') + '</div>' +
      '</div>' +
      '<div class="badges">' +
      (a.potrebujeKrev ? '<span class="ibadge">' + (a.jeBohus ? '🐂' : '🩸') + '</span>' : '') +
      (sf && a.vhodnaTeleni ? '<span class="ibadge">🐄</span>' : '') +
      '</div>' +
      '<div class="status-dot ' + dotCls + '" id="dot-' + a.cislo + '"></div>' +
      '<div class="chevron">›</div>' +
      '</div>' +
      '<div class="card-body">' + bodyHtml + '</div>' +
      '</div>';
  }).join('');
}

function renderKrev() {
  const panel = document.getElementById('krev-panel');
  panel.innerHTML = '';
  ['Ales','Pavel'].forEach(subj => {
    const prov = subj==='Ales' ? 'CZ 71053129' : 'CZ 71021753';
    const kusy = ANIMALS.filter(a => a.subjekt===subj && a.potrebujeKrev)
      .sort((a,b) => {
        const av = parseInt(getC(a.cislo).cisloVzorku || a.cisloVzorku || 999);
        const bv = parseInt(getC(b.cislo).cisloVzorku || b.cisloVzorku || 999);
        return av - bv;
      });
    const done = kusy.filter(a => getC(a.cislo).krev==='ok').length;
    let rows = kusy.map(a => {
      const vz = getC(a.cislo).cisloVzorku || (a.cisloVzorku ? String(a.cisloVzorku) : '');
      const isDone = getC(a.cislo).krev === 'ok';
      return '<tr class="' + (isDone?'done':'') + '"><td>' + (vz||'<span style="color:#e53935">❓</span>') + '</td>' +
        '<td>' + a.usniciCislo + (a.jeBohus?' 🐂':'') + '</td>' +
        '<td>' + a.provozovna + '</td><td>' + (isDone?'✅':'') + '</td></tr>';
    }).join('');
    panel.innerHTML += '<div class="exp-card">' +
      '<h3>🩸 ' + (subj==='Ales'?'Aleš':subj) + ' (' + prov + ')</h3>' +
      '<p style="font-size:12px;color:#666;margin-bottom:8px">Celkem ' + kusy.length + ' ks · odebráno: ' + done + '</p>' +
      '<table class="krev-table"><tr><th>#</th><th>Číslo zvířete</th><th>Provozovna</th><th>✅</th></tr>' + rows + '</table>' +
      '<button class="exp-btn" style="margin-top:10px" onclick="printKrev('' + subj + '')">🖨️ Tisknout / PDF</button>' +
      '</div>';
  });
}

function printKrev(subj) {
  const prov = subj==='Ales' ? 'CZ 71053129' : 'CZ 71021753';
  const kusy = ANIMALS.filter(a => a.subjekt===subj && a.potrebujeKrev)
    .sort((a,b) => {
      const av = parseInt(getC(a.cislo).cisloVzorku || a.cisloVzorku || 999);
      const bv = parseInt(getC(b.cislo).cisloVzorku || b.cisloVzorku || 999);
      return av - bv;
    });
  const rows = kusy.map(a => {
    const vz = getC(a.cislo).cisloVzorku || (a.cisloVzorku ? String(a.cisloVzorku) : '');
    return '<tr><td>' + vz + '</td><td>' + a.usniciCislo + (a.jeBohus?' (Plemenný býk)':'') + '</td><td>' + a.provozovna + '</td></tr>';
  }).join('');
  const w = window.open('','_blank');
  w.document.write('<html><head><title>Vzorky krve - ' + subj + '</title>' +
    '<style>body{font-family:Arial;font-size:13px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:6px 10px}th{background:#fce4ec}</style></head>' +
    '<body><h2>Vzorek krve – ' + (subj==='Ales'?'Aleš':subj) + ' (' + prov + ')</h2>' +
    '<p>Datum: ' + new Date().toLocaleDateString('cs-CZ') + '</p>' +
    '<table><tr><th>Vzorek krve</th><th>Číslo zvířete</th><th>Provozovna</th></tr>' + rows + '</table>' +
    '<script>window.print();<\/script></body></html>');
}

function renderExport() {
  const base = ANIMALS;
  const videno  = base.filter(a => getC(a.cislo).videno==='ok');
  const missing = base.filter(a => getC(a.cislo).videno==='nenalezeno');
  const kTot = base.filter(a => a.potrebujeKrev);
  const kOk  = kTot.filter(a => getC(a.cislo).krev==='ok');
  const brezne = base.filter(a => getC(a.cislo).brezost==='brezna');
  const matele = base.filter(a => getC(a.cislo).brezost==='ma_tele');
  const prazdne= base.filter(a => getC(a.cislo).brezost==='prazdna');
  const znam   = base.filter(a => getC(a.cislo).znamky && getC(a.cislo).znamky!=='ok');
  const pct = Math.round(videno.length / base.length * 100) || 0;
  const sc = (arr, s) => arr.filter(a => a.subjekt===s);

  document.getElementById('exp-panel').innerHTML =
    '<div class="exp-card"><h3>📊 Stav inventury</h3>' +
    '<table class="sum-table"><tr><th></th><th style="color:#1565c0">Aleš</th><th style="color:#6a1f8a">Pavel</th><th>Celkem</th></tr>' +
    '<tr><td>Celkem ks</td><td>' + sc(base,'Ales').length + '</td><td>' + sc(base,'Pavel').length + '</td><td>' + base.length + '</td></tr>' +
    '<tr><td>✅ Viděno</td><td>' + sc(videno,'Ales').length + '</td><td>' + sc(videno,'Pavel').length + '</td><td>' + videno.length + '</td></tr>' +
    '<tr><td>❌ Nenalezeno</td><td>' + sc(missing,'Ales').length + '</td><td>' + sc(missing,'Pavel').length + '</td><td>' + missing.length + '</td></tr>' +
    '<tr><td>🩸 Krev</td><td>' + sc(kOk,'Ales').length + '/' + sc(kTot,'Ales').length + '</td><td>' + sc(kOk,'Pavel').length + '/' + sc(kTot,'Pavel').length + '</td><td>' + kOk.length + '/' + kTot.length + '</td></tr>' +
    '<tr><td>🐄 Březích</td><td colspan="2"></td><td>' + brezne.length + '</td></tr>' +
    '<tr><td>🐄 Má tele</td><td colspan="2"></td><td>' + matele.length + '</td></tr>' +
    '<tr><td>⚪ Prázdných</td><td colspan="2"></td><td>' + prazdne.length + '</td></tr>' +
    '<tr><td>🏷️ Prob. známky</td><td colspan="2"></td><td>' + znam.length + '</td></tr>' +
    '</table>' +
    '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="prog-label">' + pct + '% zkontrolováno</div></div>' +
    (missing.length ? '<div class="exp-card"><h3>❌ Nenalezená (' + missing.length + ')</h3>' +
      missing.map(a => '<div class="prob-row"><b>' + a.cislo.slice(-9,-3) + '</b> ' + a.usniciCislo +
        ' · <b style="color:' + (a.subjekt==='Ales'?'#1565c0':'#6a1f8a') + '">' + a.subjekt + '</b>' +
        (getC(a.cislo).poznamka ? ' — ' + getC(a.cislo).poznamka : '') + '</div>').join('') + '</div>' : '') +
    (znam.length ? '<div class="exp-card"><h3>🏷️ Prob. známky (' + znam.length + ')</h3>' +
      znam.map(a => '<div class="prob-row"><b>' + a.usniciCislo + '</b> · ' + getC(a.cislo).znamky + '</div>').join('') + '</div>' : '') +
    '<div class="exp-card"><h3>📥 Export CSV</h3><button class="exp-btn" onclick="exportCSV()">Stáhnout CSV pro Excel</button></div>';
}

function exportCSV() {
  const rows = [['Číslo','Ušní číslo','Subjekt','Pohlaví','Kategorie','Plemeno','Datum nar.','Stáří','Provozovna','Matka','Potřebuje krev','Vhodná telení','Číslo vzorku','Viděno','Ušní známky','Krev','Březost','Poznámka']];
  ANIMALS.forEach(a => {
    const c = getC(a.cislo);
    const vz = c.cisloVzorku || (a.cisloVzorku ? String(a.cisloVzorku) : '');
    rows.push([a.cislo, a.usniciCislo, a.subjekt, a.pohlavi, a.kategorie, a.plemeno, a.datNar, a.stari,
      a.provozovna, a.matka, a.potrebujeKrev?'Ano':'Ne', a.vhodnaTeleni?'Ano':'Ne', vz,
      c.videno||'', c.znamky||'', c.krev||'', c.brezost||'', (c.poznamka||'').replace(/\n/g,' ')]);
  });
  const csv = rows.map(r => r.map(x => '"' + String(x||'').replace(/"/g,'""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'}));
  a.download = 'inventura_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// INIT
document.getElementById('date-disp').textContent = new Date().toLocaleDateString('cs-CZ', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
loadLocal();
updateStats();
renderList();
</script>
